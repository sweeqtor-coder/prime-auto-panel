<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRIME AUTO — Аналітика та Керування</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Apple-style Dashboard */
:root {
  --bg: #f5f5f7;
  --panel: rgba(255, 255, 255, 0.7);
  --panel-solid: #ffffff;
  --text: #1d1d1f;
  --text-muted: #86868b;
  --border: rgba(0, 0, 0, 0.08);
  --ac: #0071e3; /* Apple Blue */
  --ac-hover: #0077ed;
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --purple: #af52de;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --panel: rgba(28, 28, 30, 0.7);
    --panel-solid: #1c1c1e;
    --text: #f5f5f7;
    --text-muted: #86868b;
    --border: rgba(255, 255, 255, 0.1);
    --ac: #0a84ff;
    --ac-hover: #0071e3;
    --shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 2rem; -webkit-font-smoothing: antialiased;
}
/* Blurred background shapes */
.bg-shape {
  position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: -1;
}
.s1 { top: -100px; left: -100px; width: 400px; height: 400px; background: var(--ac); }
.s2 { bottom: -100px; right: -100px; width: 500px; height: 500px; background: var(--purple); }

.container { max-width: 1400px; margin: 0 auto; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }
.title h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.title p { color: var(--text-muted); font-size: 14px; }
.actions { display: flex; gap: 12px; align-items: center; }

/* Buttons */
.btn {
  padding: 10px 18px; border-radius: 100px; font-family: inherit; font-size: 14px; font-weight: 600;
  border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--ac); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--ac-hover); transform: scale(1.02); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--panel-solid); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }

/* Layout Grid */
.grid-layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
@media (max-width: 1024px) { .grid-layout { grid-template-columns: 1fr; } }

/* Cards */
.card {
  background: var(--panel); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow);
  margin-bottom: 24px;
}
.card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

/* Sellers List */
.seller-input { display: flex; gap: 8px; margin-bottom: 16px; }
.input {
  flex: 1; padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.05); color: var(--text); font-family: inherit; font-size: 14px;
}
.input:focus { outline: none; border-color: var(--ac); }
.seller-list { display: flex; flex-direction: column; gap: 8px; }
.seller-item {
  display: flex; justify-content: space-between; align-items: center; padding: 10px 14px;
  background: rgba(134, 134, 139, 0.1); border-radius: 10px; font-size: 13px; font-weight: 500;
}
.del-btn { color: var(--red); cursor: pointer; background: none; border: none; font-size: 16px; }

/* Analytics Grid */
.analytics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.stat-box {
  background: var(--panel-solid); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
  display: flex; flex-direction: column; justify-content: center;
}
.stat-val { font-size: 24px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.02em; }
.stat-lbl { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Filters */
.filters-wrap { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
.filter-group { display: flex; flex-wrap: wrap; gap: 8px; }
.f-btn {
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: transparent;
  color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s;
}
.f-btn.active { background: var(--ac); color: #fff; border-color: var(--ac); }
.f-reset { color: var(--red); border-color: rgba(255,59,48,0.3); }

/* Table */
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 13px; }
th {
  text-align: left; padding: 12px 16px; color: var(--text-muted); font-weight: 600;
  border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap;
}
th:hover { color: var(--text); }
td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(134, 134, 139, 0.05); }

/* Badges */
.badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-dtp { background: rgba(255, 59, 48, 0.15); color: var(--red); }
.b-nodtp { background: rgba(52, 199, 89, 0.15); color: var(--green); }
.b-f-Бензин { background: rgba(255, 149, 0, 0.15); color: var(--orange); }
.b-f-Дизель { background: rgba(0, 113, 227, 0.15); color: var(--ac); }
.b-f-Електро { background: rgba(175, 82, 222, 0.15); color: var(--purple); }
.b-f-Гібрид { background: rgba(52, 199, 89, 0.15); color: var(--green); }
.b-active { color: var(--green); font-weight: 500; }
.b-inactive { color: var(--red); font-weight: 500; }

.price-col { font-weight: 700; font-size: 14px; }
.photos-wrap { display: flex; gap: 4px; max-width: 140px; overflow: hidden; }
.photos-wrap img { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 1px solid var(--border); }

/* Progress bar */
.progress-container { display: none; margin-bottom: 24px; }
.progress-bg { height: 8px; background: rgba(134,134,139,0.2); border-radius: 4px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--ac); width: 0%; transition: width 0.3s; }
.log-box { font-family: monospace; font-size: 11px; color: var(--text-muted); max-height: 100px; overflow-y: auto; margin-top: 8px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
  z-index: 1000; display: none; align-items: center; justify-content: center; padding: 2rem;
}
.modal-overlay.open { display: flex; }
.modal-content {
  background: var(--panel-solid); border-radius: var(--radius); max-width: 900px; width: 100%;
  max-height: 90vh; overflow-y: auto; padding: 24px; position: relative;
}
.close-modal {
  position: absolute; top: 16px; right: 16px; background: rgba(134,134,139,0.2); border-radius: 50%;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 24px; }
.photo-grid img { width: 100%; border-radius: 12px; aspect-ratio: 4/3; object-fit: cover; cursor: pointer; }
</style>
</head>
<body>
<div class="bg-shape s1"></div><div class="bg-shape s2"></div>

<div class="container">
  <div class="header">
    <div class="title">
      <h1>Аналітика PRIME AUTO</h1>
      <p id="lastSyncTxt">Останнє оновлення: —</p>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="exportData('xlsx')">↓ Excel</button>
      <button class="btn btn-secondary" onclick="exportData('js')">↓ JS Каталог</button>
      <button class="btn btn-primary" id="btnUpdate" onclick="runScrape()">Оновити дані</button>
    </div>
  </div>

  <div class="progress-container" id="progCont">
    <div class="progress-bg"><div class="progress-bar" id="progBar"></div></div>
    <div class="log-box" id="progLog"></div>
  </div>

  <div class="grid-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="card">
        <h3>Продавці (ID або URL)</h3>
        <div class="seller-input">
          <input type="text" id="sellerInput" class="input" placeholder="URL з auto.ria або ID">
          <button class="btn btn-primary" onclick="addSeller()">+</button>
        </div>
        <div class="seller-list" id="sellerList"></div>
      </div>

      <div class="card">
        <h3>Фільтри</h3>
        <div class="filters-wrap">
          <div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Паливо:</div>
            <div class="filter-group" id="fuelFilters">
              <button class="f-btn" data-type="fuel" data-val="Бензин">Бензин</button>
              <button class="f-btn" data-type="fuel" data-val="Дизель">Дизель</button>
              <button class="f-btn" data-type="fuel" data-val="Електро">Електро</button>
              <button class="f-btn" data-type="fuel" data-val="Гібрид">Гібрид</button>
            </div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Стан:</div>
            <div class="filter-group" id="dtpFilters">
              <button class="f-btn" data-type="dtp" data-val="Не ДТП">Без ДТП</button>
              <button class="f-btn" data-type="dtp" data-val="Був в ДТП">Був в ДТП</button>
            </div>
          </div>
          <button class="f-btn f-reset" onclick="resetFilters()">Скинути всі фільтри</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="card" style="padding: 16px;">
        <div class="analytics">
          <div class="stat-box">
            <div class="stat-lbl">Всього авто</div>
            <div class="stat-val" id="statCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Сумарна вартість</div>
            <div class="stat-val" id="statTotalVal" style="color:var(--green)">$0</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Середня ціна</div>
            <div class="stat-val" id="statAvg">$0</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Найдорожче авто</div>
            <div class="stat-val" id="statMax" style="font-size:18px;margin-bottom:2px">$0</div>
            <div class="stat-sub" id="statMaxN">—</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Найдешевше авто</div>
            <div class="stat-val" id="statMin" style="font-size:18px;margin-bottom:2px">$0</div>
            <div class="stat-sub" id="statMinN">—</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th onclick="setSort('i')">#</th>
                <th onclick="setSort('name_en')">Модель</th>
                <th onclick="setSort('year')">Рік</th>
                <th onclick="setSort('price')">Ціна</th>
                <th onclick="setSort('fuel')">Паливо</th>
                <th>ДТП</th>
                <th>Пробіг</th>
                <th>Фото</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <div class="close-modal" onclick="document.getElementById('modal').classList.remove('open')">✕</div>
    <h3 id="modalTitle" style="font-size:20px;margin-bottom:8px">Фото</h3>
    <div class="photo-grid" id="modalGrid"></div>
  </div>
</div>

<script>
// --- State ---
let sellers = JSON.parse(localStorage.getItem('pa_sellers') || '["1640523"]');
let allCars = [];
let sortCol = 'i';
let sortAsc = true;
let activeFilters = { fuel: new Set(), dtp: new Set() };
let pollTimer = null;

// --- Init ---
renderSellers();
initFilterEvents();
checkStatus();

// --- Sellers Logic ---
function saveSellers() { localStorage.setItem('pa_sellers', JSON.stringify(sellers)); renderSellers(); }
function renderSellers() {
  document.getElementById('sellerList').innerHTML = sellers.map(s => 
    `<div class="seller-item">ID: ${s} <button class="del-btn" onclick="delSeller('${s}')">✕</button></div>`
  ).join('');
}
function addSeller() {
  const inp = document.getElementById('sellerInput');
  let val = inp.value.trim();
  if(!val) return;
  // Try extract ID from URL
  const m = val.match(/(?:user_id=|dealers\/[^\/]+\/|cabinet\/)(\d+)/);
  if(m) val = m[1];
  else val = val.replace(/\D/g, ''); // just digits if raw input
  
  if(val && !sellers.includes(val)) {
    sellers.push(val);
    saveSellers();
  }
  inp.value = '';
}
function delSeller(id) {
  if(sellers.length === 1) return alert('Повинен бути хоча б один продавець!');
  sellers = sellers.filter(s => s !== id);
  saveSellers();
}

// --- Scrape API ---
async function runScrape() {
  const btn = document.getElementById('btnUpdate');
  btn.disabled = true; btn.textContent = 'Запуск...';
  document.getElementById('progCont').style.display = 'block';
  document.getElementById('progLog').innerHTML = '';
  document.getElementById('progBar').style.width = '0%';

  try {
    await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_ids: sellers })
    });
    checkStatus();
  } catch(e) {
    alert('Помилка запуску'); btn.disabled = false;
  }
}

function checkStatus() {
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch('/api/status');
      const d = await res.json();
      
      document.getElementById('progBar').style.width = d.progress + '%';
      const logBox = document.getElementById('progLog');
      logBox.innerHTML = d.log.slice(-10).map(l => `<div>[${l.t.split('T')[1].slice(0,8)}] ${l.msg}</div>`).join('');
      logBox.scrollTop = logBox.scrollHeight;

      if(!d.running) {
        clearInterval(pollTimer);
        document.getElementById('btnUpdate').disabled = false;
        document.getElementById('btnUpdate').textContent = 'Оновити дані';
        if(d.has_result) loadData();
      }
    } catch(e){}
  }, 1500);
}

async function loadData() {
  try {
    const res = await fetch('/api/catalog');
    if(!res.ok) return;
    const data = await res.json();
    allCars = (data.cars || []).map((c,i) => ({...c, i: i+1}));
    document.getElementById('lastSyncTxt').textContent = 'Останнє оновлення: ' + new Date(data.scraped_at+'Z').toLocaleString('uk');
    document.getElementById('progCont').style.display = 'none';
    renderTable();
  } catch(e) {}
}

// --- Filters & Sorting ---
function initFilterEvents() {
  document.querySelectorAll('.f-btn[data-type]').forEach(b => {
    b.addEventListener('click', () => {
      b.classList.toggle('active');
      const type = b.dataset.type;
      const val = b.dataset.val;
      if(b.classList.contains('active')) activeFilters[type].add(val);
      else activeFilters[type].delete(val);
      renderTable();
    });
  });
}
function resetFilters() {
  activeFilters.fuel.clear(); activeFilters.dtp.clear();
  document.querySelectorAll('.f-btn[data-type]').forEach(b => b.classList.remove('active'));
  renderTable();
}
function setSort(col) {
  if(sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

// --- Rendering ---
function renderTable() {
  // Apply filters
  let rows = allCars.filter(c => {
    const pFuel = activeFilters.fuel.size === 0 || activeFilters.fuel.has(c.fuel);
    const pDtp = activeFilters.dtp.size === 0 || activeFilters.dtp.has(c.dtp);
    return pFuel && pDtp;
  });

  // Calculate Analytics based on visible rows
  updateAnalytics(rows);

  // Sort
  rows.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if(sortCol === 'price') { va = parseInt(String(va).replace(/\D/g,'')||0); vb = parseInt(String(vb).replace(/\D/g,'')||0); }
    if(sortCol === 'year') { va = parseInt(va)||0; vb = parseInt(vb)||0; }
    if(va < vb) return sortAsc ? -1 : 1;
    if(va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('tbody').innerHTML = rows.map((c, idx) => {
    const dtpCls = c.dtp === 'Був в ДТП' ? 'b-dtp' : 'b-nodtp';
    const fuelCls = `b-f-${c.fuel}`;
    const ph = (c.photos||[]).slice(0,3).map(u => `<img src="${u}" onclick="openGallery(${c.i-1})">`).join('');
    return `
      <tr>
        <td style="color:var(--text-muted)">${idx+1}</td>
        <td>
          <div style="font-weight:600">${c.name_en}</div>
          <div style="font-size:11px;color:var(--text-muted)"><a href="${c.url}" target="_blank">↗ auto.ria</a></div>
        </td>
        <td>${c.year}</td>
        <td class="price-col">${c.price}</td>
        <td><span class="badge ${fuelCls}">${c.fuel}</span></td>
        <td><span class="badge ${dtpCls}">${c.dtp}</span></td>
        <td style="color:var(--text-muted)">${c.mileage}</td>
        <td><div class="photos-wrap">${ph}</div></td>
        <td class="${c.active!==false ? 'b-active' : 'b-inactive'}">${c.active!==false ? 'Активне' : 'Знято'}</td>
      </tr>
    `;
  }).join('');
}

function updateAnalytics(rows) {
  document.getElementById('statCount').textContent = rows.length;
  
  let prices = rows.map(c => ({ p: parseInt(String(c.price).replace(/\D/g,'')||0), n: c.name_en })).filter(x => x.p > 0);
  if(prices.length === 0) {
    document.getElementById('statTotalVal').textContent = '$0';
    document.getElementById('statAvg').textContent = '$0';
    document.getElementById('statMax').textContent = '$0';
    document.getElementById('statMin').textContent = '$0';
    document.getElementById('statMaxN').textContent = '—';
    document.getElementById('statMinN').textContent = '—';
    return;
  }
  
  prices.sort((a,b) => a.p - b.p);
  const sum = prices.reduce((a,b)=>a+b.p, 0);
  const avg = Math.round(sum / prices.length);
  const min = prices[0];
  const max = prices[prices.length-1];

  document.getElementById('statTotalVal').textContent = '$' + sum.toLocaleString('uk');
  document.getElementById('statAvg').textContent = '$' + avg.toLocaleString('uk');
  document.getElementById('statMax').textContent = '$' + max.p.toLocaleString('uk');
  document.getElementById('statMaxN').textContent = max.n;
  document.getElementById('statMin').textContent = '$' + min.p.toLocaleString('uk');
  document.getElementById('statMinN').textContent = min.n;
}

// --- Gallery ---
function openGallery(idx) {
  const c = allCars[idx];
  if(!c || !c.photos) return;
  document.getElementById('modalTitle').textContent = c.name_en;
  document.getElementById('modalGrid').innerHTML = c.photos.map(u => `<img src="${u}" onclick="window.open('${u}','_blank')">`).join('');
  document.getElementById('modal').classList.add('open');
}

// --- Export ---
function exportData(type) {
  if(!allCars.length) return alert('Немає даних для експорту');
  if(type === 'js') {
    const arr = allCars.filter(c=>c.active!==false).map(c=>({n:c.name_en, ua:c.name_ua, y:c.year, f:c.fuel, m:c.mileage, p:c.price, t:c.transmission, dtp:c.dtp, u:c.url, photos:c.photos||[]}));
    const text = 'const CATALOG = { cars: ' + JSON.stringify(arr, null, 2) + ' };\n';
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([text],{type:'text/javascript'}));
    a.download = 'cars.js'; a.click();
  } else if (type === 'xlsx') {
    const rows = [['#','Model EN','Year','Fuel','Mileage','Price','DTP','Status','URL','Photos']];
    allCars.forEach((c,i) => rows.push([i+1, c.name_en, c.year, c.fuel, c.mileage, c.price, c.dtp, c.active!==false?'Active':'Inactive', c.url, (c.photos||[]).join(' | ')]));
    const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Catalog'); XLSX.writeFile(wb, 'catalog.xlsx');
  }
}
</script>
</body>
</html>
